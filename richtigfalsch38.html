<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Russisch Übung: Richtig oder Falsch?</title>
    <style>
        :root {
            --primary-color: #4a90e2;
            --success-color: #2ecc71;
            --error-color: #e74c3c;
            --bg-color: #f5f7fa;
            --card-bg: #ffffff;
            --text-color: #2c3e50;
            --border-color: #e2e8f0;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            padding: 15px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            background: var(--card-bg);
            width: 100%;
            max-width: 650px;
            padding: 25px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.05);
        }

        h2 {
            font-size: 1.4rem;
            margin-bottom: 8px;
            text-align: center;
        }

        p.instruction {
            color: #7f8c8d;
            font-size: 0.9rem;
            text-align: center;
            margin-bottom: 25px;
        }

        .statements-list {
            display: flex;
            flex-direction: column;
            gap: 20px;
            margin-bottom: 25px;
        }

        .statement-card {
            background: #f8f9fa;
            border: 2px solid var(--border-color);
            border-radius: 8px;
            padding: 15px;
            transition: all 0.3s ease;
        }

        .statement-text {
            font-size: 1.05rem;
            font-weight: 500;
            line-height: 1.5;
            margin-bottom: 12px;
        }

        .actions {
            display: flex;
            gap: 10px;
        }

        .btn-choice {
            flex: 1;
            padding: 10px;
            border: 2px solid var(--border-color);
            background: white;
            border-radius: 6px;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            color: var(--text-color);
        }

        @media (hover: hover) {
            .btn-choice:hover:not(.disabled) {
                border-color: var(--primary-color);
                background: #f0f7ff;
            }
        }

        /* Zustände nach der Beantwortung */
        .btn-choice.disabled {
            pointer-events: none;
            opacity: 0.6;
        }

        .btn-choice.selected-correct {
            background-color: var(--success-color) !important;
            border-color: var(--success-color) !important;
            color: white !important;
            opacity: 1 !important;
        }

        .btn-choice.selected-wrong {
            background-color: var(--error-color) !important;
            border-color: var(--error-color) !important;
            color: white !important;
            opacity: 1 !important;
        }

        .explanation {
            margin-top: 10px;
            font-size: 0.9rem;
            line-height: 1.4;
            display: none;
            font-weight: 500;
        }

        .explanation.visible {
            display: block;
        }

        .global-score {
            text-align: center;
            font-weight: bold;
            font-size: 1.1rem;
            min-height: 24px;
            margin-top: 20px;
        }

        .nav-btn {
            display: block;
            width: 100%;
            max-width: 180px;
            margin: 20px auto 0 auto;
            padding: 12px;
            background: transparent;
            border: 2px solid var(--border-color);
            color: #7f8c8d;
            border-radius: 6px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            text-align: center;
        }

        .nav-btn:hover {
            background-color: #f8f9fa;
            color: var(--text-color);
        }
    </style>
</head>
<body>

<div class="container">
    <h2>Richtig oder Falsch?</h2>
    <p class="instruction">Bewerte die folgenden Aussagen zur Verwendung und Bedeutung der gelernten Redewendungen.</p>

    <div class="statements-list" id="statements-container">
        <!-- Inhalte werden per JS generiert -->
    </div>

    <div class="global-score" id="score-zone"></div>
    <button class="nav-btn" onclick="resetQuiz()">Neustart</button>
</div>

<script>
    const dataset = [
        {
            text: "Die Frage Что нового verwendet man, wenn man jemanden erst gestern gesehen hat.",
            expected: false,
            expTrue: "",
            expFalse: "Richtig bewertet! Diese Frage nutzt man typischerweise dann, wenn man Freunde oder Bekannte länger nicht gesehen hat."
        },
        {
            text: "Der Ausdruck Что у вас нового richtet sich grammatikalisch an eine einzelne Person, die man sehr gut kennt (duzen).",
            expected: false,
            expTrue: "",
            expFalse: "Richtig bewertet! Das Wort „вас“ bedeutet „euch“ (oder „Ihnen“), es wird also für Gruppen oder als Höflichkeitsform genutzt."
        },
        {
            text: "Wenn jemand fragt „Что нового?“, ist die russische Antwort „Привет“ logisch und inhaltlich absolut ausreichend.",
            expected: false,
            expTrue: "",
            expFalse: "Richtig bewertet! „Привет“ heißt nur „Hallo“. Auf die Frage nach Neuigkeiten erwartet das Gegenüber jedoch, dass man von Erlebnissen berichtet."
        },
        {
            text: "Das Wort „Привет“ wird im Russischen genutzt, um eine Person beim Wiedersehen zu begrüßen.",
            expected: true,
            expTrue: "Richtig bewertet! „Привет“ ist die normale, informelle Begrüßung unter Freunden und Bekannten.",
            expFalse: ""
        },
        {
            text: "Die Aufforderung „Напишите в комментариях“ bedeutet übersetzt, dass man eine schriftliche Postkarte verfassen soll.",
            expected: false,
            expTrue: "",
            expFalse: "Richtig bewertet! Es bedeutet „Schreibt in die Kommentare“, was sich meist auf Social-Media- oder Blog-Beiträge bezieht."
        }
    ];

    let answeredCount = 0;
    let correctCount = 0;

    function initQuiz() {
        answeredCount = 0;
        correctCount = 0;
        document.getElementById('score-zone').innerText = "";
        
        const container = document.getElementById('statements-container');
        container.innerHTML = '';

        dataset.forEach((item, idx) => {
            const card = document.createElement('div');
            card.className = 'statement-card';
            card.id = `card-${idx}`;

            card.innerHTML = `
                <div class="statement-text">${item.text}</div>
                <div class="actions">
                    <button class="btn-choice" id="btn-true-${idx}" onclick="handleChoice(${idx}, true)">Richtig</button>
                    <button class="btn-choice" id="btn-false-${idx}" onclick="handleChoice(${idx}, false)">Falsch</button>
                </div>
                <div class="explanation" id="exp-${idx}"></div>
            `;

            container.appendChild(card);
        });
    }

    function handleChoice(index, studentChoice) {
        const item = dataset[index];
        const btnTrue = document.getElementById(`btn-true-${index}`);
        const btnFalse = document.getElementById(`btn-false-${index}`);
        const expDiv = document.getElementById(`exp-${index}`);
        const card = document.getElementById(`card-${index}`);

        // Buttons deaktivieren
        btnTrue.classList.add('disabled');
        btnFalse.classList.add('disabled');

        const isCorrect = (studentChoice === item.expected);
        answeredCount++;

        if (isCorrect) {
            correctCount++;
            card.style.borderColor = 'var(--success-color)';
            if (studentChoice === true) {
                btnTrue.classList.add('selected-correct');
            } else {
                btnFalse.classList.add('selected-correct');
            }
            expDiv.innerText = "✓ " + (item.expected ? item.expTrue : item.expFalse);
            expDiv.style.color = 'var(--success-color)';
        } else {
            card.style.borderColor = 'var(--error-color)';
            if (studentChoice === true) {
                btnTrue.classList.add('selected-wrong');
            } else {
                btnFalse.classList.add('selected-wrong');
            }
            expDiv.innerText = "✗ Das stimmt leider nicht. " + (item.expected ? item.expTrue : item.expFalse);
            expDiv.style.color = 'var(--error-color)';
        }

        expDiv.classList.add('visible');

        // Prüfen, ob alle Fragen beantwortet wurden
        if (answeredCount === dataset.length) {
            const scoreZone = document.getElementById('score-zone');
            scoreZone.innerText = `Ergebnis: ${correctCount} von ${dataset.length} richtig gelöst!`;
            if (correctCount === dataset.length) {
                scoreZone.innerText += " 🏆 Perfekt!";
                scoreZone.style.color = 'var(--success-color)';
            } else {
                scoreZone.style.color = 'var(--text-color)';
            }
        }
    }

    function resetQuiz() {
        initQuiz();
    }

    window.onload = initQuiz;
</script>

</body>
</html>

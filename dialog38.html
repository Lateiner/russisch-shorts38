<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Russisch Übung: Dialog sortieren</title>
    <style>
        :root {
            --primary-color: #4a90e2;
            --success-color: #2ecc71;
            --error-color: #e74c3c;
            --bg-color: #f5f7fa;
            --card-bg: #ffffff;
            --text-color: #2c3e50;
            --border-color: #e2e8f0;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            padding: 15px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            background: var(--card-bg);
            width: 100%;
            max-width: 650px;
            padding: 25px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.05);
        }

        h2 {
            font-size: 1.3rem;
            margin-bottom: 8px;
            text-align: center;
        }

        p.instruction {
            color: #7f8c8d;
            font-size: 0.9rem;
            text-align: center;
            margin-bottom: 25px;
            line-height: 1.4;
        }

        .dialog-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-bottom: 25px;
        }

        .dialog-item {
            display: flex;
            align-items: center;
            background: #ffffff;
            border: 2px solid var(--border-color);
            border-radius: 8px;
            padding: 12px 16px;
            gap: 15px;
            transition: all 0.2s ease;
        }

        .dialog-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .speaker-label {
            font-size: 0.75rem;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: #94a3b8;
        }

        .phrase-ru {
            font-size: 1.1rem;
            font-weight: 600;
            color: var(--text-color);
        }

        .phrase-de {
            font-size: 0.85rem;
            color: #7f8c8d;
            font-style: italic;
        }

        .action-buttons {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .move-btn {
            background: #f1f5f9;
            border: 1px solid var(--border-color);
            color: #475569;
            border-radius: 4px;
            width: 36px;
            height: 32px;
            font-size: 1rem;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: all 0.15s;
        }

        .move-btn:hover:not(:disabled) {
            background-color: var(--primary-color);
            color: white;
            border-color: var(--primary-color);
        }

        .move-btn:disabled {
            opacity: 0.3;
            cursor: not-allowed;
        }

        /* Validierungs-Zustände */
        .container.validated .dialog-item.correct {
            border-color: var(--success-color);
            background-color: #e8f8f0;
        }

        .container.validated .dialog-item.wrong {
            border-color: var(--error-color);
            background-color: #fdedec;
        }

        .feedback-box {
            text-align: center;
            font-weight: 600;
            font-size: 1.05rem;
            min-height: 40px;
            line-height: 1.4;
            margin-bottom: 15px;
        }

        .controls {
            display: flex;
            gap: 12px;
            justify-content: center;
        }

        .nav-btn {
            padding: 12px 24px;
            border: none;
            border-radius: 6px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }

        .btn-primary {
            background-color: var(--primary-color);
            color: white;
        }

        .btn-primary:hover {
            background-color: #357abd;
        }

        .btn-outline {
            background-color: transparent;
            border: 2px solid var(--border-color);
            color: #7f8c8d;
        }

        .btn-outline:hover {
            background-color: #f8f9fa;
            color: var(--text-color);
        }
    </style>
</head>
<body>

<div class="container" id="quiz-container">
    <h2>Dialog-Reihenfolge bestimmen</h2>
    <p class="instruction">Dieser russische Dialog ist durcheinandergeraten. Bringe die Zeilen mithilfe der Pfeiltasten (▲/▼) in die richtige logische Reihenfolge.</p>

    <div class="dialog-list" id="dialog-list">
        <!-- Wird dynamisch per JavaScript befüllt -->
    </div>

    <div class="feedback-box" id="feedback-message"></div>
    
    <div class="controls">
        <button class="nav-btn btn-primary" id="check-btn" onclick="checkOrder()">Reihenfolge prüfen</button>
        <button class="nav-btn btn-outline" id="reset-btn" onclick="resetGame()" style="display: none;">Neustart</button>
    </div>
</div>

<script>
    // Die exakte, korrekte Reihenfolge (id dient zur Identifikation)
    const correctSolution = [
        { id: "s1", speaker: "Person A", ru: "Привет, Антон!", de: "Hallo, Anton!" },
        { id: "s2", speaker: "Person A", ru: "Что у вас нового?", de: "Was gibt es bei euch Neues?" },
        { id: "s3", speaker: "Person B", ru: "Ничего особенного, всё по-старому.", de: "Nichts Besonderes, alles beim Alten." },
        { id: "s4", speaker: "Person B", ru: "А у тебя?", de: "Und bei dir?" }
    ];

    let currentItems = [];
    let isEvaluated = false;

    function initGame() {
        isEvaluated = false;
        document.getElementById('quiz-container').classList.remove('validated');
        document.getElementById('feedback-message').innerText = "";
        document.getElementById('check-btn').style.display = "block";
        document.getElementById('reset-btn').style.display = "none";

        // Kopieren und so lange mischen, bis es nicht zufällig der Lösung entspricht
        do {
            currentItems = [...correctSolution].sort(() => Math.random() - 0.5);
        } while (isAlreadyCorrect());

        renderDialog();
    }

    function isAlreadyCorrect() {
        return currentItems.every((item, idx) => item.id === correctSolution[idx].id);
    }

    function renderDialog() {
        const listContainer = document.getElementById('dialog-list');
        listContainer.innerHTML = '';

        currentItems.forEach((item, index) => {
            const row = document.createElement('div');
            row.className = 'dialog-item';
            row.setAttribute('data-id', item.id);

            // Inhalt der Sprechzeile
            const content = document.createElement('div');
            content.className = 'dialog-content';
            
            const speaker = document.createElement('span');
            speaker.className = 'speaker-label';
            speaker.innerText = item.speaker;

            const ru = document.createElement('span');
            ru.className = 'phrase-ru';
            ru.innerText = item.ru;

            const de = document.createElement('span');
            de.className = 'phrase-de';
            de.innerText = item.de;

            content.appendChild(speaker);
            content.appendChild(ru);
            content.appendChild(de);

            // Button-Steuerung (Hoch/Runter)
            const actions = document.createElement('div');
            actions.className = 'action-buttons';

            const upBtn = document.createElement('button');
            upBtn.className = 'move-btn';
            upBtn.innerHTML = '▲';
            upBtn.disabled = index === 0 || isEvaluated;
            upBtn.onclick = () => moveItem(index, -1);

            const downBtn = document.createElement('button');
            downBtn.className = 'move-btn';
            downBtn.innerHTML = '▼';
            downBtn.disabled = index === currentItems.length - 1 || isEvaluated;
            downBtn.onclick = () => moveItem(index, 1);

            actions.appendChild(upBtn);
            actions.appendChild(downBtn);

            row.appendChild(content);
            row.appendChild(actions);
            listContainer.appendChild(row);
        });
    }

    function moveItem(index, direction) {
        if (isEvaluated) return;
        const targetIndex = index + direction;
        
        // Plätze im Array tauschen
        const temp = currentItems[index];
        currentItems[index] = currentItems[targetIndex];
        currentItems[targetIndex] = temp;

        renderDialog();
    }

    function checkOrder() {
        isEvaluated = true;
        const listContainer = document.getElementById('dialog-list');
        const rows = listContainer.querySelectorAll('.dialog-item');
        const feedbackEl = document.getElementById('feedback-message');
        
        document.getElementById('quiz-container').classList.add('validated');
        
        let correctCount = 0;

        rows.forEach((row, index) => {
            const id = row.getAttribute('data-id');
            // Deaktiviert die Pfeiltasten nach der Prüfung
            const buttons = row.querySelectorAll('.move-btn');
            buttons.forEach(b => b.disabled = true);

            if (id === correctSolution[index].id) {
                row.classList.add('correct');
                correctCount++;
            } else {
                row.classList.add('wrong');
            }
        });

        if (correctCount === correctSolution.length) {
            feedbackEl.style.color = "var(--success-color)";
            feedbackEl.innerText = "Super! 🎉 Der Dialog ist jetzt absolut logisch: Erst begrüßen sich die Personen, dann folgt die Frage nach Neuigkeiten, die Antwort und zum Schluss die Gegenfrage.";
        } else {
            feedbackEl.style.color = "var(--error-color)";
            feedbackEl.innerText = "Noch nicht ganz richtig. Überprüfe noch einmal die logische Abfolge (Begrüßung → Frage → Antwort → Gegenfrage).";
        }

        document.getElementById('check-btn').style.display = "none";
        document.getElementById('reset-btn').style.display = "block";
    }

    function resetGame() {
        initGame();
    }

    // Beim Laden starten
    window.onload = initGame;
</script>

</body>
</html>
